<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Remote Score</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin:20px;
}

.player{
border:1px solid #ddd;
padding:10px;
margin:10px;
}

button{
padding:8px;
margin:4px;
}

input{
padding:8px;
margin:4px;
}

</style>

</head>

<body>

<h2>REMOTE SCORE</h2>

<button onclick="addPlayer()">Tambah Player</button>

<div id="players"></div>

<script>

const firebaseConfig={
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

function addPlayer(){

let ref=db.ref("players").push();

ref.set({
name:"Player",
score:0
});

}

function changeName(id,name){

db.ref("players/"+id+"/name").set(name);

}

function addScore(id,val){

db.ref("players/"+id).once("value",snap=>{

let data=snap.val();

let newScore=(data.score||0)+val;

db.ref("players/"+id+"/score").set(newScore);

db.ref("history").push(val);

});

}

db.ref("players").on("value",snap=>{

let players=snap.val();

let div=document.getElementById("players");

div.innerHTML="";

if(!players) return;

Object.entries(players).forEach(([id,p])=>{

div.innerHTML+=`

<div class="player">

<input value="${p.name}" onchange="changeName('${id}',this.value)">

<div>Score : ${p.score}</div>

<input id="score${id}" type="number" placeholder="input poin">

<br>

<button onclick="addScore('${id}',parseInt(document.getElementById('score${id}').value)||0)">
TAMBAH POIN
</button>

</div>

`;

});

});

</script>

</body>
</html>
