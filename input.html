<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Remote Score</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
text-align:center;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.player{
background:white;
padding:15px;
border-radius:10px;
width:220px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
padding:6px;
margin:4px;
}

button{
padding:8px;
margin:4px;
}

</style>

</head>

<body>

<h2>REMOTE SCORE</h2>

<button onclick="addPlayer()">Tambah Player</button>

<div id="players" class="container"></div>

<script>

const firebaseConfig={
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

function addPlayer(){

db.ref("game").once("value",(snap)=>{

let data=snap.val()||{}

let players=data.players||[]

players.push({
name:"Player "+(players.length+1),
score:0
})

db.ref("game/players").set(players)

})

}

function removePlayer(i){

db.ref("game/players").once("value",(snap)=>{

let players=snap.val()

players.splice(i,1)

db.ref("game/players").set(players)

})

}

function changeName(i,val){

db.ref("game/players/"+i+"/name").set(val)

}

function addScore(i,val){

db.ref("game").once("value",(snap)=>{

let data=snap.val()

let players=data.players
let history=data.history||[]

players[i].score+=val

history.push(players.map(p=>p.score))

db.ref("game").set({
players:players,
history:history
})

})

}

function undo(){

db.ref("game").once("value",(snap)=>{

let data=snap.val()

let history=data.history

if(!history||history.length==0) return

history.pop()

let last=history[history.length-1]

data.players.forEach((p,i)=>{
p.score=last?last[i]:0
})

db.ref("game").set(data)

})

}

db.ref("game/players").on("value",(snap)=>{

let players=snap.val()

let div=document.getElementById("players")
div.innerHTML=""

if(!players) return

players.forEach((p,i)=>{

div.innerHTML+=`

<div class="player">

<input value="${p.name}" onchange="changeName(${i},this.value)">

<div>Score : ${p.score}</div>

<input type="number" id="score${i}" placeholder="input poin">

<br>

<button onclick="addScore(${i},parseInt(document.getElementById('score${i}').value))">

Tambah Poin

</button>

<button onclick="undo()">UNDO</button>

<button onclick="removePlayer(${i})">Hapus</button>

</div>

`

})

})

</script>

</body>
</html>
