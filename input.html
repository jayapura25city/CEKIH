<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Remote Score</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin:20px;
}

.player{
border:1px solid #ddd;
padding:10px;
margin:10px;
}

input{
padding:8px;
margin:4px;
}

button{
padding:8px;
margin:4px;
}

</style>

</head>

<body>

<h2>REMOTE SCORE</h2>

<button onclick="addPlayer()">Tambah Player</button>

<div id="players"></div>

<script>

const firebaseConfig = {
databaseURL: "https://bryan-9b585-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function addPlayer(){

db.ref("game/players").once("value",snap=>{

let players=snap.val() || [];

players.push({
name:"Player "+(players.length+1),
score:0
});

db.ref("game/players").set(players);

});

}

function changeName(i,name){

db.ref("game/players/"+i+"/name").set(name);

}

function addScore(i,val){

db.ref("game").once("value",snap=>{

let data=snap.val() || {};

let players=data.players || [];
let history=data.history || [];

players[i].score += val;

history.push(val);

db.ref("game").set({
players:players,
history:history
});

});

}

function undo(){

db.ref("game").once("value",snap=>{

let data=snap.val();

if(!data || !data.history) return;

let history=data.history;

if(history.length==0) return;

history.pop();

data.players.forEach(p=>p.score=0);

history.forEach(v=>{
data.players[0].score += v;
});

db.ref("game").set(data);

});

}

db.ref("game/players").on("value",snap=>{

let players=snap.val();

let div=document.getElementById("players");

div.innerHTML="";

if(!players) return;

players.forEach((p,i)=>{

div.innerHTML+=`

<div class="player">

<input value="${p.name}" onchange="changeName(${i},this.value)">

<div>Score : ${p.score}</div>

<input id="score${i}" type="number" placeholder="input poin bebas">

<br>

<button onclick="addScore(${i},parseInt(document.getElementById('score${i}').value)||0)">
TAMBAH
</button>

</div>

`;

});

});

</script>

</body>
</html>
