<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>REMOTE SCORE</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
text-align:center;
background:#f4f4f4;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.player{
background:white;
padding:15px;
border-radius:10px;
width:230px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
padding:6px;
margin:4px;
}

button{
padding:8px;
margin:4px;
}

</style>

</head>

<body>

<h2>REMOTE SCORE</h2>

<button onclick="addPlayer()">Tambah Player</button>

<div id="players" class="container"></div>

<script>

const firebaseConfig={
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

function addPlayer(){

let ref=db.ref("game/players").push()

ref.set({
name:"Player",
score:0,
streak:0,
shuffle:0
})

}

function changeName(id,val){

db.ref("game/players/"+id+"/name").set(val)

}

function addScore(id){

let val=parseInt(document.getElementById("score"+id).value)

if(isNaN(val)) return

db.ref("game").once("value",(snap)=>{

let data=snap.val()

let players=data.players || {}
let history=data.history || []

players[id].score+=val

if(val>0){

players[id].streak=(players[id].streak||0)+1

if(players[id].streak>=3)
players[id].sticker="KETAWA 1.gif"

}else{

players[id].streak=0
players[id].sticker=""

}

let row=[]

Object.values(players).forEach(p=>{
row.push(p.score)
})

history.push(row)

db.ref("game").update({
players:players,
history:history
})

})

}

function undoPlayer(){

db.ref("game").once("value",(snap)=>{

let data=snap.val()

let history=data.history || []

if(history.length==0) return

history.pop()

let last=history[history.length-1]

let i=0

Object.keys(data.players).forEach(id=>{

data.players[id].score=last?last[i]:0

i++

})

db.ref("game").update({
players:data.players,
history:history
})

})

}

db.ref("game/players").on("value",(snap)=>{

let players=snap.val()

let div=document.getElementById("players")

div.innerHTML=""

if(!players) return

Object.entries(players).forEach(([id,p])=>{

div.innerHTML+=`

<div class="player">

<input value="${p.name}" onchange="changeName('${id}',this.value)">

<div>Score : ${p.score}</div>

<input id="score${id}" type="number" placeholder="input poin">

<br>

<button onclick="addScore('${id}')">Tambah</button>

<button onclick="undoPlayer()">UNDO</button>

</div>

`

})

})

</script>

</body>
</html>
