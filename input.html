<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Remote Score</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
font-family:Arial;
margin:20px;
text-align:center;
background:#f5f5f5;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.player{
background:white;
padding:15px;
border-radius:10px;
width:220px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
padding:6px;
margin:4px;
width:120px;
}

button{
padding:8px;
margin:4px;
}
</style>

</head>

<body>

<h2>REMOTE SCORE</h2>

<button onclick="addPlayer()">Tambah Player</button>

<div id="players" class="container"></div>

<script>

const firebaseConfig={
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

function addPlayer(){

db.ref("game/players").once("value",snap=>{

let players=snap.val()

if(!players) players=[]

players.push({
name:"Player "+(players.length+1),
score:0
})

db.ref("game/players").set(players)

})

}

function changeName(i,name){
db.ref("game/players/"+i+"/name").set(name)
}

function addScore(i){

let input=document.getElementById("score"+i)

let val=parseInt(input.value)

if(isNaN(val)) return

db.ref("game").once("value",snap=>{

let data=snap.val()

if(!data){
data={players:[],history:[]}
}

let players=data.players||[]
let history=data.history||[]

players[i].score=(players[i].score||0)+val

let row=players.map(p=>p.score)

history.push(row)

db.ref("game").set({
players:players,
history:history
})

input.value=""

})

}

function undo(){

db.ref("game").once("value",snap=>{

let data=snap.val()

if(!data || !data.history) return

let history=data.history

if(history.length==0) return

history.pop()

let last=history[history.length-1]

data.players.forEach((p,i)=>{
p.score=last?last[i]:0
})

db.ref("game").set(data)

})

}

db.ref("game/players").on("value",snap=>{

let players=snap.val()

let div=document.getElementById("players")

div.innerHTML=""

if(!players) return

players.forEach((p,i)=>{

div.innerHTML+=`

<div class="player">

<input value="${p.name}" onchange="changeName(${i},this.value)">

<div>Score : ${p.score}</div>

<input id="score${i}" type="number" placeholder="input poin">

<br>

<button onclick="addScore(${i})">
Tambah
</button>

<button onclick="undo()">
Undo
</button>

</div>

`

})

})

</script>

</body>
</html>
