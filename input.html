<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Input Score</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:30px;
}

button{
padding:12px;
margin:6px;
font-size:16px;
width:200px;
}

</style>

</head>

<body>

<h2>REMOTE SCORE</h2>

<input id="player" type="number" placeholder="Player Index">

<br><br>

<button onclick="addScore(250)">Masuk Joker +250</button>
<button onclick="addScore(150)">Masuk AS +150</button>

<button onclick="addScore(-250)">Kena Joker -250</button>
<button onclick="addScore(-150)">Kena AS -150</button>

<br><br>

<input id="manual" type="number" placeholder="Input poin bebas">

<button onclick="manual()">Tambah Poin</button>

<script>

const firebaseConfig={
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

function addScore(value){

let player=document.getElementById("player").value

db.ref("game/players/"+player+"/total").transaction((score)=>{

return (score||0)+value

})

}

function manual(){

let player=document.getElementById("player").value
let val=parseInt(document.getElementById("manual").value)

db.ref("game/players/"+player+"/total").transaction((score)=>{

return (score||0)+val

})

}

</script>

</body>
</html>
