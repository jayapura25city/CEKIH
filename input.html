<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Remote Score</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin:20px;
}

.player{
border:1px solid #ddd;
padding:10px;
margin:10px;
}

button{
padding:10px;
margin:5px;
}

input{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<h2>REMOTE SCORE</h2>

<button onclick="addPlayer()">Tambah Player</button>

<div id="players"></div>

<script>

const firebaseConfig={
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

function addPlayer(){

let id=db.ref("players").push().key

db.ref("players/"+id).set({
name:"Player",
score:0,
lastUpdate:Date.now()
})

}

function removePlayer(id){

db.ref("players/"+id).remove()

}

function addScore(id,val){

db.ref("players/"+id).transaction(p=>{

if(!p) return p

p.score+=val
p.lastUpdate=Date.now()

return p

})

}

function changeName(id,val){

db.ref("players/"+id+"/name").set(val)

}

db.ref("players").on("value",(snap)=>{

let data=snap.val()

let div=document.getElementById("players")

div.innerHTML=""

if(!data) return

Object.entries(data).forEach(([id,p])=>{

div.innerHTML+=`

<div class="player">

<input value="${p.name}" onchange="changeName('${id}',this.value)">

<div>Score : ${p.score}</div>

<button onclick="addScore('${id}',250)">+250</button>
<button onclick="addScore('${id}',150)">+150</button>
<button onclick="addScore('${id}',-250)">-250</button>
<button onclick="addScore('${id}',-150)">-150</button>

<button onclick="removePlayer('${id}')">Hapus</button>

</div>

`

})

})

</script>

</body>
</html>
