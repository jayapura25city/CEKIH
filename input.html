<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Input Score</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:50px;
}

input{
padding:10px;
margin:5px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>INPUT SCORE</h2>

<input id="player" placeholder="Nama pemain">

<input id="score" type="number" placeholder="Score">

<br><br>

<button onclick="kirim()">Kirim Score</button>

<script>

const firebaseConfig = {
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)

let db=firebase.database()

function kirim(){

let player=document.getElementById("player").value
let score=parseInt(document.getElementById("score").value)

db.ref("game/last").set({
player:player,
score:score,
time:Date.now()
})

}

</script>

</body>
</html>
