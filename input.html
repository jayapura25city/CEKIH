<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Remote Score</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
font-family:Arial;
margin:20px;
text-align:center;
background:#f4f4f4;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.player{
background:white;
padding:15px;
border-radius:10px;
width:220px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
padding:6px;
margin:4px;
width:120px;
}

button{
padding:8px;
margin:4px;
}
</style>

</head>

<body>

<h2>REMOTE SCORE</h2>

<button onclick="addPlayer()">Tambah Player</button>

<div id="players" class="container"></div>

<script>

const firebaseConfig={
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

function addPlayer(){

let ref=db.ref("game/players").push()

ref.set({
name:"Player",
score:0
})

}

function changeName(id,name){

db.ref("game/players/"+id+"/name").set(name)

}

function addScore(id){

let val=parseInt(document.getElementById("score"+id).value)

if(isNaN(val)) return

db.ref("game/players/"+id).once("value",snap=>{

let data=snap.val()

let newScore=(data.score||0)+val

db.ref("game/players/"+id+"/score").set(newScore)

db.ref("game/history").push({
player:id,
score:val
})

})

}

function undo(){

db.ref("game/history").limitToLast(1).once("value",snap=>{

let last

snap.forEach(child=>{
last={id:child.key,data:child.val()}
})

if(!last) return

let player=last.data.player
let score=last.data.score

db.ref("game/players/"+player+"/score").once("value",s=>{

let newScore=(s.val()||0)-score

db.ref("game/players/"+player+"/score").set(newScore)

})

db.ref("game/history/"+last.id).remove()

})

}

db.ref("game/players").on("value",snap=>{

let players=snap.val()

let div=document.getElementById("players")

div.innerHTML=""

if(!players) return

Object.entries(players).forEach(([id,p])=>{

div.innerHTML+=`

<div class="player">

<input value="${p.name}" onchange="changeName('${id}',this.value)">

<div>Score : ${p.score}</div>

<input id="score${id}" type="number" placeholder="input poin">

<br>

<button onclick="addScore('${id}')">
Tambah
</button>

<button onclick="undo()">
Undo
</button>

</div>

`

})

})

</script>

</body>
</html>
