<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Score Game Kartu</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
text-align:center;
background-size:cover;
background-position:center;
}

.lightMode{background-image:url("MODE TERANG.jpg");}
.darkMode{background-image:url("MODE GELAP.jpg");}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

.player{
background:white;
padding:15px;
border-radius:10px;
width:240px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.total{
font-size:34px;
margin-bottom:4px;
}

</style>
</head>

<body class="lightMode">

<h2>Score Game Kartu</h2>

<div id="players" class="container"></div>

<script>

const firebaseConfig = {
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)
const db = firebase.database()

let players=[]

db.ref("game/players").on("value",(snap)=>{

players = snap.val()

render()

})

function render(){

let container=document.getElementById("players")
container.innerHTML=""

if(!players) return

players.forEach((p,i)=>{

container.innerHTML+=`

<div class="player">

<div>${p.name}</div>

<div class="total">${p.total}</div>

</div>

`

})

}

</script>

</body>
</html>
