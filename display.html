<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Score Game Kartu</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
text-align:center;
background-image:url("MODE TERANG.jpg");
background-size:cover;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

.player{
background:white;
padding:15px;
border-radius:10px;
width:240px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.total{
font-size:34px;
margin-bottom:4px;
}

.sticker{
width:80px;
margin-top:5px;
}

table{
width:100%;
max-width:900px;
margin:auto;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:6px;
}

</style>

</head>

<body>

<h2>Score Game Kartu</h2>

<div id="players" class="container"></div>

<table id="history">
<thead>
<tr id="headerRow">
<th>Ronde</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const firebaseConfig={
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

db.ref("game").on("value",(snap)=>{

let data=snap.val()
if(!data) return

renderPlayers(data.players)
renderHistory(data.history)

})

function renderPlayers(players){

let container=document.getElementById("players")
container.innerHTML=""

players.forEach(p=>{

let sticker=""

if(p.sticker)
sticker=`<img src="${p.sticker}" class="sticker">`

container.innerHTML+=`

<div class="player">

<div>${p.name}</div>

<div class="total">${p.score}</div>

${sticker}

</div>

`

})

}

function renderHistory(history){

let tbody=document.querySelector("#history tbody")
tbody.innerHTML=""

for(let i=history.length-1;i>=0;i--){

let r=history[i]

let row="<tr><td>"+(i+1)+"</td>"

r.forEach(v=>{
row+="<td>"+(v||"")+"</td>"
})

row+="</tr>"

tbody.innerHTML+=row

}

}

</script>

</body>
</html>
