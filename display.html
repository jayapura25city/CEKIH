<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Score Game Kartu</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
text-align:center;
background:#f4f4f4;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

.player{
background:white;
padding:20px;
border-radius:12px;
width:260px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.total{
font-size:40px;
color:red;
}

table{
margin:auto;
border-collapse:collapse;
background:white;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

</style>

</head>

<body>

<h2>Score Game Kartu</h2>

<div id="players" class="container"></div>

<table>

<thead>
<tr id="header"></tr>
</thead>

<tbody id="history"></tbody>

</table>

<script>

const firebaseConfig={
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

db.ref("game").on("value",snap=>{

let data=snap.val()

if(!data) return

renderPlayers(data.players)
renderHistory(data)

})

function renderPlayers(players){

let div=document.getElementById("players")

div.innerHTML=""

players.forEach(p=>{

div.innerHTML+=`

<div class="player">

<div>${p.name}</div>

<div class="total">${p.score}</div>

</div>

`

})

}

function renderHistory(data){

let header=document.getElementById("header")
let tbody=document.getElementById("history")

header.innerHTML="<th>Ronde</th>"

data.players.forEach(p=>{
header.innerHTML+=`<th>${p.name}</th>`
})

tbody.innerHTML=""

if(!data.history) return

for(let i=data.history.length-1;i>=0;i--){

let r=data.history[i]

let row=`<tr><td>${i+1}</td>`

r.forEach(v=>{
row+=`<td>${v}</td>`
})

row+="</tr>"

tbody.innerHTML+=row

}

}

</script>

</body>
</html>
