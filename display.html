<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Score Game Kartu</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
text-align:center;
background-size:cover;
background-position:center;
}

.lightMode{background-image:url("MODE TERANG.jpg");}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.player{
background:white;
padding:15px;
border-radius:10px;
width:240px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.total{
font-size:36px;
color:red;
}

</style>
</head>

<body class="lightMode">

<h2>Score Game Kartu</h2>

<div id="players" class="container"></div>

<script>

const firebaseConfig={
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

db.ref("players").on("value",(snap)=>{

let data=snap.val()

if(!data) return

let arr=Object.values(data)

arr.sort((a,b)=>b.lastUpdate-a.lastUpdate)

render(arr)

})

function render(players){

let div=document.getElementById("players")
div.innerHTML=""

players.forEach(p=>{

div.innerHTML+=`

<div class="player">

<div>${p.name}</div>

<div class="total">${p.score}</div>

</div>

`

})

}

</script>

</body>
</html>
