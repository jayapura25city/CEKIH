<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Score Game Kartu</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
text-align:center;
background-image:url("MODE TERANG.jpg");
background-size:cover;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.player{
background:white;
padding:15px;
border-radius:10px;
width:220px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.total{
font-size:36px;
color:red;
}

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
background:white;
}

td,th{
border:1px solid #ccc;
padding:6px;
}

</style>

</head>

<body>

<h2>Score Game Kartu</h2>

<div id="players" class="container"></div>

<table>

<thead>
<tr>
<th>Ronde</th>
<th>Score</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

<script>

const firebaseConfig = {
databaseURL: "https://bryan-9b585-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

db.ref("game").on("value",snap=>{

let data=snap.val();

if(!data) return;

renderPlayers(data.players);
renderHistory(data.history);

});

function renderPlayers(players){

let div=document.getElementById("players");
div.innerHTML="";

players.forEach(p=>{

div.innerHTML+=`

<div class="player">

<div>${p.name}</div>

<div class="total">${p.score}</div>

</div>

`;

});

}

function renderHistory(history){

let tbody=document.getElementById("history");
tbody.innerHTML="";

if(!history) return;

for(let i=history.length-1;i>=0;i--){

tbody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${history[i]}</td>
</tr>
`;

}

}

</script>

</body>
</html>
