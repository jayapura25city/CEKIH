<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Score Game Kartu</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
text-align:center;
background:#f4f4f4;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.player{
background:white;
padding:15px;
border-radius:10px;
width:220px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.total{
font-size:36px;
color:red;
}

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
background:white;
}

td,th{
border:1px solid #ccc;
padding:6px;
}

</style>

</head>

<body>

<h2>Score Game Kartu</h2>

<div id="players" class="container"></div>

<table>
<thead>
<tr>
<th>Riwayat</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>

<script>

const firebaseConfig={
databaseURL:"https://bryan-9b585-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

db.ref("players").on("value",snap=>{

let data=snap.val();
renderPlayers(data);

});

db.ref("history").on("value",snap=>{

let data=snap.val();
renderHistory(data);

});

function renderPlayers(players){

let div=document.getElementById("players");
div.innerHTML="";

if(!players) return;

Object.entries(players).forEach(([id,p])=>{

div.innerHTML+=`

<div class="player">

<div>${p.name}</div>

<div class="total">${p.score}</div>

</div>

`;

});

}

function renderHistory(history){

let tbody=document.getElementById("history");
tbody.innerHTML="";

if(!history) return;

let arr=Object.values(history);

for(let i=arr.length-1;i>=0;i--){

tbody.innerHTML+=`<tr><td>${arr[i]}</td></tr>`;

}

}

</script>

</body>
</html>
